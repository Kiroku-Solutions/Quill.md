<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<!--
			Strict Content Security Policy (CSP)
			This matches static/_headers but is enforced via meta tag for hosts like GitHub Pages.
			Note: frame-ancestors and report-uri are ignored in <meta>, but they are in _headers.
		-->
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.github.com https://gitlab.com https://*.githubusercontent.com; object-src 'none'; base-uri 'none'; form-action 'none';"
		/>
		<!--
			Referrer fallback: every outbound request the page initiates should
			omit the Referer header. The header-based policy in static/_headers
			is canonical; this <meta> is the case where the host strips headers.
		-->
		<meta name="referrer" content="no-referrer" />
		<!--
			No-flash theme bootstrap (FR-14). Runs synchronously before the
			body renders, so the .dark class is set in time for the first
			paint. The script is small enough to keep the CSP `script-src
			'self' 'unsafe-inline'` (or, in 6L, we add a nonce — the script
			body is the only inline JS in the project).
		-->
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('quill.md.theme');
					var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var dark = stored === 'dark' || (stored == null && prefersDark);
					if (dark) document.documentElement.classList.add('dark');
				} catch (e) {
					/* fail silently; the +layout.svelte onMount will retry. */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
